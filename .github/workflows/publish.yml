name: Publish New Version

on:
  release:
    types: [published]

permissions:
  contents: write  # Allow committing manifest.json and uploading release assets

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ env.VERSION }}
      source-zip-file: mindful-browse-${{ env.VERSION }}-source.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Update manifest.json with release version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"

          if [ -z "$VERSION" ]; then
            echo "❌ Failed to extract version from tag"
            exit 1
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "✅ Extracted version: $VERSION"
          
          jq --arg version "$VERSION" '.version = $version' src/manifest.json > src/manifest.json.tmp
          mv src/manifest.json.tmp src/manifest.json
          echo "✅ Updated manifest.json to version $VERSION"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet src/manifest.json; then
            echo "✅ Manifest already at version $VERSION, no commit needed"
          else
            git add src/manifest.json
            git commit -m "chore: update manifest.json to v$VERSION [skip ci]"
            git push origin HEAD:${{ github.event.release.target_commitish }}
          fi

      - name: Build extension
        run: npm run build

      - name: Prepare Firefox distribution
        run: |
          mkdir -p firefox-dist
          cp -r dist/* firefox-dist/
          cp firefox-dist/manifest.firefox.json firefox-dist/manifest.json
          rm -f firefox-dist/manifest.*.json

      - name: Prepare Chrome distribution
        run: |
          mkdir -p chrome-dist
          cp -r dist/* chrome-dist/
          cp chrome-dist/manifest.chrome.json chrome-dist/manifest.json
          rm -f chrome-dist/manifest.*.json

      - name: Create Firefox extension zip
        run: |
          zip -r "mindful-browse-${{ env.VERSION }}-firefox.zip" firefox-dist/
          ls -lh "mindful-browse-${{ env.VERSION }}-firefox.zip"

      - name: Create Chrome extension zip
        run: |
          zip -r "mindful-browse-${{ env.VERSION }}-chrome.zip" chrome-dist/
          ls -lh "mindful-browse-${{ env.VERSION }}-chrome.zip"

      - name: Create generic extension zip (for source release)
        run: |
          zip -r "mindful-browse-${{ env.VERSION }}.zip" firefox-dist/
          ls -lh "mindful-browse-${{ env.VERSION }}.zip"

      - name: Create source zip (for AMO review)
        run: |
          zip -r "mindful-browse-${{ env.VERSION }}-source.zip" . \
            --exclude='claude/*' \
            --exclude='marketing/*' \
            --exclude='public/*' \
            --exclude='node_modules/*' \
            --exclude='dist/*' \
            --exclude='.git/*' \
            --exclude='.github/*' \
            --exclude='.gitignore' \
            --exclude='CLAUDE.md' \
            --exclude='todo.md' \
            --exclude='*.log'
          ls -lh "mindful-browse-${{ env.VERSION }}-source.zip"

      - name: Upload Firefox dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: firefox-dist
          path: firefox-dist/
          retention-days: 1

      - name: Upload Chrome dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-dist
          path: chrome-dist/
          retention-days: 1

      - name: Upload source zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-source
          path: mindful-browse-${{ env.VERSION }}-source.zip
          retention-days: 1

      - name: Upload zips to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            "mindful-browse-${{ env.VERSION }}.zip" \
            "mindful-browse-${{ env.VERSION }}-firefox.zip" \
            "mindful-browse-${{ env.VERSION }}-chrome.zip" \
            "mindful-browse-${{ env.VERSION }}-source.zip"

  publish-firefox:
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true

    steps:
      - name: Download Firefox dist artifact
        uses: actions/download-artifact@v4
        with:
          name: firefox-dist
          path: firefox-dist/

      - name: Download source zip artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-source
          path: .

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Sign and submit extension to Firefox AMO
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          SOURCE_ZIP="mindful-browse-$VERSION-source.zip"
          RELEASE_NOTES="${{ github.event.release.body }}"

          web-ext sign \
            --source-dir=firefox-dist/ \
            --channel=listed \
            --api-key=${{ secrets.FIREFOX_API_KEY }} \
            --api-secret=${{ secrets.FIREFOX_API_SECRET }} \
            --upload-source-code=$SOURCE_ZIP \
            --release-notes="$RELEASE_NOTES" \
            --artifacts-dir=./web-ext-artifacts/

          echo "✅ Extension signed and submitted to Firefox AMO"

  publish-chrome:
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true

    steps:
      - name: Download Chrome dist artifact
        uses: actions/download-artifact@v4
        with:
          name: chrome-dist
          path: chrome-dist/

      - name: Create zip from Chrome dist
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          zip -r "mindful-browse-chrome-$VERSION.zip" chrome-dist/
          ls -lh "mindful-browse-chrome-$VERSION.zip"

      - name: Exchange refresh token for access token
        id: auth
        run: |
          ACCESS_TOKEN=$(curl -s -X POST \
            "https://oauth2.googleapis.com/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.CHROME_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.CHROME_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.CHROME_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token" | jq -r '.access_token')

          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" == "null" ]; then
            echo "❌ Failed to obtain access token"
            exit 1
          fi

          echo "access-token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT
          echo "✅ Successfully obtained access token"

      - name: Upload zip to Chrome Web Store
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          ZIP_FILE="mindful-browse-chrome-$VERSION.zip"
          EXTENSION_ID="${{ secrets.CHROME_EXTENSION_ID }}"
          ACCESS_TOKEN="${{ steps.auth.outputs.access-token }}"

          # Upload the zip file
          UPLOAD_RESPONSE=$(curl -s -X PUT \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/$EXTENSION_ID" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -F "file=@$ZIP_FILE")

          echo "Upload response: $UPLOAD_RESPONSE"

          # Check for errors
          if echo "$UPLOAD_RESPONSE" | grep -q '"uploadStatus":"SUCCESS"'; then
            echo "✅ Successfully uploaded to Chrome Web Store"
          else
            echo "❌ Upload failed or returned unexpected status"
            exit 1
          fi

      - name: Publish item to Chrome Web Store
        run: |
          EXTENSION_ID="${{ secrets.CHROME_EXTENSION_ID }}"
          ACCESS_TOKEN="${{ steps.auth.outputs.access-token }}"
          RELEASE_NOTES="${{ github.event.release.body }}"

          # Publish the item
          PUBLISH_RESPONSE=$(curl -s -X POST \
            "https://www.googleapis.com/chromewebstore/v1.1/items/$EXTENSION_ID/publish" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0")

          echo "Publish response: $PUBLISH_RESPONSE"

          # Check for success
          if echo "$PUBLISH_RESPONSE" | grep -q '"status":\["IN_PROGRESS"\]'; then
            echo "✅ Successfully published to Chrome Web Store"
          else
            echo "⚠️  Publish status: $PUBLISH_RESPONSE"
          fi 

          # Properly JSON-encode the release notes to handle special characters
          NOTES_JSON=$(jq -n --arg notes "$RELEASE_NOTES" '{releaseNotes: {"en-US": $notes}}')

          # Update metadata with release notes
          NOTES_RESPONSE=$(curl -s -X PATCH \
            "https://www.googleapis.com/chromewebstore/v1.1/items/$EXTENSION_ID" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "x-goog-api-version: 2" \
            -H "Content-Type: application/json" \
            -d "$NOTES_JSON")

          echo "Release notes response: $NOTES_RESPONSE"

          # Check for success (if no error field, it succeeded)
          if ! echo "$NOTES_RESPONSE" | grep -q '"error"'; then
            echo "✅ Successfully added release notes to Chrome Web Store"
          else
            echo "⚠️  Release notes update status: $NOTES_RESPONSE"
          fi

  deploy-status:
    runs-on: ubuntu-latest
    needs: [build, publish-firefox, publish-chrome]
    if: always()

    steps:
      - name: Update GitHub release with deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.build.outputs.version }}';
            const buildStatus = '${{ needs.build.result }}';
            const firefoxStatus = '${{ needs.publish-firefox.result }}';
            const chromeStatus = '${{ needs.publish-chrome.result }}';

            const statusEmoji = (status) => {
              if (status === 'success') return '✅';
              if (status === 'failure') return '❌';
              if (status === 'cancelled') return '⏭️';
              return '⚠️';
            };

            const releaseId = context.payload.release.id;

            // Get current release body
            const { data: release } = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
            });

            // Build status strings
            const buildStatusStr = buildStatus.charAt(0).toUpperCase() + buildStatus.slice(1);
            const firefoxStatusStr = firefoxStatus.charAt(0).toUpperCase() + firefoxStatus.slice(1);
            const chromeStatusStr = chromeStatus.charAt(0).toUpperCase() + chromeStatus.slice(1);

            // Append deployment status table
            const statusTable =
              '---\n\n' +
              '## Deployment Status\n\n' +
              '| Component | Status |\n' +
              '|-----------|--------|\n' +
              '| Build | ' + statusEmoji(buildStatus) + ' ' + buildStatusStr + ' |\n' +
              '| Firefox AMO | ' + statusEmoji(firefoxStatus) + ' ' + firefoxStatusStr + ' |\n' +
              '| Chrome Web Store | ' + statusEmoji(chromeStatus) + ' ' + chromeStatusStr + ' |\n\n' +
              '**Workflow**: [Run #' + context.runNumber + '](' + context.payload.repository.html_url + '/actions/runs/' + context.runId + ')';

            const updatedBody = (release.body || '') + '\n' + statusTable;

            // Update release with status
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              body: updatedBody,
            });

            console.log('✅ Updated release with deployment status');
